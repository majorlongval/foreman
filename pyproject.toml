[tool.ruff]
# Target Python version
target-version = "py311"
# Same as Black.
line-length = 88
indent-width = 4

[tool.ruff.lint]
# Enable all requested rules
select = ["E", "W", "F", "I", "C", "B", "UP", "PL", "N"]
ignore = []

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
strict_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true

[[tool.mypy.overrides]]
module = "github.*"
ignore_missing_imports = true

# Legacy files and files with object-typed llm params are silenced until
# a proper LLMPort interface lands. Re-enable module by module as types improve.
[[tool.mypy.overrides]]
module = [
    "brain.llm_client",
    "brain.survey",
    "brain.executor",
    "brain.loop",
    "brain.tools",
    "brain.council",
    "tests.*",
    "seed_agent",
    "implement_agent",
    "review_agent",
    "fix_agent",
    "foreman_brain",
    "brain_tools",
    "cost_monitor",
    "telegram_notifier",
    "llm_client",
]
ignore_errors = true
