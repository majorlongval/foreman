[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B"]
ignore = []

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
check_untyped_defs = true

# Legacy files and files with object-typed llm params are silenced until
# a proper LLMPort interface lands. Re-enable module by module as types improve.
[[tool.mypy.overrides]]
module = [
    "brain.llm_client",
    "brain.survey",
    "brain.executor",
    "brain.loop",
    "brain.tools",
    "brain.council",
    "tests.*",
    "seed_agent",
    "implement_agent",
    "review_agent",
    "fix_agent",
    "foreman_brain",
    "brain_tools",
    "cost_monitor",
    "telegram_notifier",
    "llm_client",
]
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
