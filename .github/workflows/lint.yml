name: Lint and Type Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: runner / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ruff
        uses: reviewdog/action-ruff@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # Change reviewdog reporter if needed [github-pr-check, github-check, github-pr-review]
          reporter: github-pr-review
          # Filter mode for reviewdog
          filter_mode: added
          # Fail the job if issues are found
          fail_on_error: true

  type-check:
    name: runner / mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: mypy
        uses: reviewdog/action-mypy@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          filter_mode: added
          fail_on_error: true
          # Optional: point to specific directory
          # mypy_flags: "brain/"
