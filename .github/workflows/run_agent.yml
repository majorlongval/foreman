name: Run Seed Agent

on:
  schedule:
    # Run hourly at 15 minutes past the hour
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  run_agent:
    runs-on: ubuntu-latest

    env:
      POLL_INTERVAL: 0 # Not relevant for --once run
      BRAINSTORM_THRESHOLD: 1 # Attempt brainstorming if less than this many ready issues
      BRAINSTORM_MAX_DRAFTS: 3 # Max number of drafts to create in one run
      FOREMAN_REPO: ${{ github.repository }} # Automatically set to owner/repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install OpenAI for the seed agent
          pip install openai

      - name: Run Seed Agent
        run: python seed_agent.py --once
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}