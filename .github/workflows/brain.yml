name: Run Foreman Brain

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  brain:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours max (GitHub Actions limit)

    permissions:
      issues: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run Brain
        run: python foreman_brain.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BRAIN_MODEL: claude-sonnet-4-6
          BRAIN_MAX_TOKENS: "4096"
          BRAIN_COST_CEILING: "1.0"
          ALLOWED_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_ID }}
