name: Run Implement Agent

on:
  issues:
    types: [labeled]      # Triggers when any issue is labeled
  pull_request:
    types: [closed]       # Triggers after a PR is merged — picks up next ready issue
  workflow_dispatch:      # Manual trigger — picks next ready issue automatically

concurrency:
  group: implement-agent
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'ready' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run Implement Agent (label trigger)
        if: github.event_name == 'issues'
        run: python implement_agent.py --issue ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          COST_CEILING_USD: "3.0"

      - name: Run Implement Agent (manual or post-merge — picks next ready issue)
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
        run: python implement_agent.py --once
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          COST_CEILING_USD: "3.0"
