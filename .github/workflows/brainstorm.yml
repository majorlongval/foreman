name: Brainstorm Agent

on:
  schedule:
    - cron: '15 * * * *'  # Every hour at :15
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  brainstorm:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run Brainstorm Agent
        run: python brainstorm_agent.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          COST_CEILING_USD: "2.0"
          BRAINSTORM_MAX_DRAFTS: "3"
          AUTO_PROMOTE_DELAY_HOURS: "2"
          AUTO_PROMOTE_MAX_PER_CYCLE: "3"