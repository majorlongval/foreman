name: Run Fix Agent

on:
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: false

jobs:
  fix:
    runs-on: ubuntu-latest
    # Only run for FOREMAN reviews (not human reviews)
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.review.body, 'Review by FOREMAN')

    permissions:
      issues: write
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet anthropic PyGithub google-genai

      - name: Run Fix Agent (review trigger)
        if: github.event_name == 'pull_request_review'
        run: python fix_agent.py --pr ${{ github.event.pull_request.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          FIX_COST_CEILING_USD: "1.0"
          MAX_FIX_CYCLES: "5"

      - name: Run Fix Agent (manual trigger)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number != ''
        run: python fix_agent.py --pr ${{ github.event.inputs.pr_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          FIX_COST_CEILING_USD: "1.0"
          MAX_FIX_CYCLES: "5"

      - name: Run Fix Agent (manual - all PRs)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number == ''
        run: python fix_agent.py --once
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          FIX_COST_CEILING_USD: "1.0"
          MAX_FIX_CYCLES: "5"

      - name: Trigger review after fix
        if: success()
        run: gh workflow run review_agent.yml
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
