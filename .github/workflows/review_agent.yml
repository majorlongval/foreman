name: Review PRs

on:
  pull_request:
    types: [opened, synchronize]  # Trigger on new PRs and re-review after fix agent commits
  workflow_dispatch:               # Manual trigger

concurrency:
  group: review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Remove needs-human label
        if: github.event_name == 'pull_request' && github.event.action == 'synchronize'
        run: |
          echo "Detected new commit push (synchronize). Attempting to remove 'needs-human' label to resume autonomous loop..."
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "needs-human" || echo "Label 'needs-human' not found or already removed. Continuing."
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Run Review Agent
        run: python review_agent.py --once
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FOREMAN_REPO: ${{ secrets.FOREMAN_REPO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ROUTING_PROFILE: cheap
          COST_CEILING_USD: "1.0"
          MAX_FIX_CYCLES: "5"